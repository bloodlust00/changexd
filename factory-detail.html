<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (sessionStorage.getItem('sidebar_persistent_hover') === 'true') {
            document.documentElement.classList.add('sidebar-pushed');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangeX - Factory Details</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <header class="header">
        <div class="logo-section">
            <p class="welcome-text">Welcome to !</p>
            <h1 class="logo">Change<span>X</span></h1>
        </div>
        <div class="header-right">
            <span class="user-email" id="userEmployeeID">ID: 12345</span>
            <button class="btn btn-logout" onclick="logout()">
                <span>→</span> Logout
            </button>
        </div>
    </header>

    <div class="app-container">
        <nav class="sidebar">
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-item"><span class="nav-icon">🏠</span> Home</a></li>
                <li><a href="running-line.html" class="nav-item active"><span class="nav-icon">📉</span> Running Line Changeover</a></li>
                <li><a href="upcoming.html" class="nav-item"><span class="nav-icon">📅</span> Upcoming Changeover</a></li>
                <li><a href="live-tracking.html" class="nav-item"><span class="nav-icon">📈</span> Live CO Tracking</a></li>
                <li><a href="alerts.html" class="nav-item"><span class="nav-icon">🔔</span> Alerts</a></li>
                <li><a href="upload.html" class="nav-item"><span class="nav-icon">📤</span> Upload Data</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="whats-new.html" class="nav-item"><span class="nav-icon">🆕</span> What's New?</a>
            </div>
        </nav>

        <main class="main-content">
            <a href="running-line.html" class="back-link">← Back to Factories</a>
            
            <div class="factory-detail-card content-card" id="factoryDetail">
                <!-- Content will be loaded by JavaScript -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
    const factoryData = {};
    
    // Detailed style names and requirements for variety
    const styles = [
        { run: "H-LIAM-BD-E-C1-263-50566988", up: "KASON-A-25-50293691", req: "New needle plate, folder attachment" },
        { run: "HUGOBOSS BASIC SHIRT", up: "CKML-BN-5D", req: "Bobbin change, thread color swap, Cuff template change" },
        { run: "BOSS-CASUAL-SLIM-FIT", up: "G-STAR-RAW-DENIM", req: "Heavy duty needle, tension adjustment" },
        { run: "LEVIS-501-CLASSIC", up: "ARMANI-EX-TEE", req: "Soft touch footer, 3-thread setup" },
        { run: "RALPH-LAUREN-POLO", up: "TOMMY-HIL-SHIRT", req: "Collar attachment, buttonhole sync" },
        { run: "CALVIN-KLEIN-JEANS", up: "ZARA-BASIC-KNIT", req: "Overlock adjustment, stretch thread" },
        { run: "GUESS-SUMMER-DRESS", up: "PRADA-SILK-TOP", req: "Fine needle change, delicate feed dog" },
        { run: "NIKE-SPORTS-WEAR", up: "ADIDAS-TECH-TEE", req: "Flatlock machine setup, heat seal check" },
        { run: "PUMA-RUNNING-SHORTS", up: "REEBOK-TRAINING-PANTS", req: "Elastic folder, twin needle sync" },
        { run: "LACOSTE-PIQUE-POLO", up: "FRED-PERRY-SHIRT", req: "Rib attachment, logo placement guide" },
        { run: "DIOR-EVENING-GOWN", up: "CHANEL-TWEED-JACKET", req: "Custom template change, slow-feed setup" }
    ];

    const delayReasons = ["Waiting for mechanic", "None", "Material shortage", "None", "Quality approval pending", "None", "Machine breakdown", "None", "Part misplaced", "None", "Power outage"];

    for (let fId = 1; fId <= 5; fId++) {
        factoryData[fId] = {
            name: `Factory ${fId}`,
            lines: styles.map((style, i) => ({
                name: `Line ${i + 1}`,
                runningStyle: style.run,
                runningSMV: (20 + (i * 0.7) + (fId * 0.5)).toFixed(1),
                upcomingStyle: style.up,
                upcomingSMV: (22 + (i * 0.4) + (fId * 0.3)).toFixed(1),
                requirements: style.req,
                estimatedTime: `${30 + (i * 5)} min`,
                delayReasons: delayReasons[i]
            }))
        };
    }

    // Get factory ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const factoryId = parseInt(urlParams.get('id')) || 1;

    const factory = factoryData[factoryId];

    // Render factory details
    const detailContainer = document.getElementById('factoryDetail');

    if (factory) {
        let html = `<h2 class="factory-title">${factory.name}</h2>`;

        factory.lines.forEach((line, index) => {
            html += `
                <div class="line-section ${index > 0 ? 'line-border' : ''}">
                    <h3 class="line-title">${line.name}</h3>

                    <div class="line-details">
                        <div class="detail-column">
                            <p><strong>Running style</strong> : ${line.runningStyle}</p>
                            <p><strong>Upcoming style</strong> : ${line.upcomingStyle}</p>
                            <p><strong>Upcoming Style Requirements</strong> : ${line.requirements}</p>
                            <p><strong>Estimated Changeover time</strong> : ${line.estimatedTime}</p>
                        </div>

                        <div class="detail-column">
                            <p><strong>Running style SMV</strong> : ${line.runningSMV}</p>
                            <p><strong>Upcoming style SMV</strong> : ${line.upcomingSMV}</p>
                            <p><strong>Delay Reasons</strong> : ${line.delayReasons}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        detailContainer.innerHTML = html;

    } else {
        detailContainer.innerHTML = "<h2>Factory not found</h2>";
    }
</script>
</body>
</html>
