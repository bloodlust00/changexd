<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (sessionStorage.getItem('sidebar_persistent_hover') === 'true') {
            document.documentElement.classList.add('sidebar-pushed');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangeX - Factory Details</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .file-icon-container {
            display: inline-block;
            margin-right: 8px;
            position: relative;
            cursor: pointer;
        }
        .file-icon {
            font-size: 14px;
            color: #6c5ce7;
        }
        .file-tooltip {
            visibility: hidden;
            width: 80px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 4px 0;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -40px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 10px;
            font-weight: 700;
            pointer-events: none;
        }
        .file-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
        .file-icon-container:hover .file-tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* Systematic alignment styles */
        .detail-row {
            display: grid;
            grid-template-columns: 320px 30px 1fr; /* Fixed widths for perfect colon alignment */
            align-items: center;
            margin-bottom: 15px;
        }
        .detail-row .label {
            font-weight: 700;
            color: var(--text-dark);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .detail-row .colon {
            text-align: left;
            font-weight: 700;
            color: var(--text-dark);
        }
        .detail-row .value {
            color: var(--text-grey);
            font-weight: 500;
        }
        [data-theme="dark"] .detail-row .value {
            color: #a0a8b8;
        }
        .line-section {
            margin-bottom: 30px;
        }
        .line-border {
            border-top: 1px solid rgba(0,0,0,0.08);
            padding-top: 30px;
        }
        [data-theme="dark"] .line-border {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Line Title and Upload Button Alignment */
        .line-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .btn-upload-small {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-upload-small:hover {
            background: #5b4cc4;
            transform: translateY(-1px);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: var(--card-bg);
            margin: 10% auto;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .close-modal {
            font-size: 24px;
            color: var(--text-grey);
            cursor: pointer;
        }
        .upload-form-group {
            margin-bottom: 20px;
        }
        .upload-form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-dark);
        }
        .upload-form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            background: var(--bg-light);
            color: var(--text-grey);
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
        }
        .btn-cancel {
            background: #f1f2f6;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-submit-upload {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body class="dashboard-page">
    <header class="header">
        <div class="logo-container" style="flex-direction: row; align-items: center;">
            <img src="assets/logo.jpg" alt="Company Logo" class="company-logo">
            <div>
                <p class="welcome-text">Welcome to ChangeX!</p>
                <h1 class="logo"><span class="purple">Change</span><span class="red">X</span></h1>
            </div>
        </div>
        <div class="header-right">
            <span class="user-email" id="userEmployeeID">ID: 12345</span>
            <button class="btn btn-logout" onclick="logout()">
                <span>→</span> Logout
            </button>
        </div>
    </header>

    <div class="app-container">
        <nav class="sidebar">
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-item"><span class="nav-icon">🏠</span> Home</a></li>
                <li><a href="running-line.html" class="nav-item active"><span class="nav-icon">📉</span> Current Line Changeover</a></li>
                <li><a href="upcoming.html" class="nav-item"><span class="nav-icon">📅</span> Upcoming Changeover</a></li>
                <li><a href="alerts.html" class="nav-item"><span class="nav-icon">🔔</span> Alerts</a></li>
                <li><a href="upload.html" class="nav-item"><span class="nav-icon">📤</span> Upload Data</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="whats-new.html" class="nav-item"><span class="nav-icon">🆕</span> What's New?</a>
            </div>
        </nav>

        <main class="main-content" style="position: relative; overflow-x: hidden;">
            <!-- Decorative blobs for glass effect -->
            <div style="position: absolute; top: 10%; left: 15%; width: 300px; height: 300px; background: #6c5ce7; filter: blur(100px); opacity: 0.15; z-index: 0; border-radius: 50%;"></div>
            <div style="position: absolute; bottom: 10%; right: 15%; width: 350px; height: 350px; background: #3498db; filter: blur(120px); opacity: 0.15; z-index: 0; border-radius: 50%;"></div>
            <div style="position: absolute; top: 40%; right: 5%; width: 250px; height: 250px; background: #e74c3c; filter: blur(100px); opacity: 0.1; z-index: 0; border-radius: 50%;"></div>

            <div style="position: relative; z-index: 1;">
                <a href="running-line.html" class="back-link">← Back to Factories</a>
                
                <div class="factory-detail-card content-card" id="factoryDetail">
                    <!-- Content will be loaded by JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Upload Line Data</h2>
                <span class="close-modal">&times;</span>
            </div>
            <form id="lineUploadForm">
                <input type="hidden" id="modalLineNum">
                <div class="upload-form-group">
                    <label for="excelFile">Excel Sheet (Production/Target Data)</label>
                    <input type="file" id="excelFile" accept=".xlsx, .xls">
                </div>
                <div class="upload-form-group">
                    <label for="pdfFile">PDF File (Style/Process Details)</label>
                    <input type="file" id="pdfFile" accept="application/pdf">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelUpload">Cancel</button>
                    <button type="submit" class="btn-submit-upload">Upload Files</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
    function openOBFile(style, type, line) {
        if (!style || style === 'Loading...' || style === 'N/A') {
            alert('No file available for this style.');
            return;
        }
        window.open(`/api/open-ob?style=${encodeURIComponent(style)}&type=${type}&line=${line}`, '_blank');
    }

    // Modal elements
    const modal = document.getElementById('uploadModal');
    const closeBtn = document.querySelector('.close-modal');
    const cancelBtn = document.getElementById('cancelUpload');
    const uploadForm = document.getElementById('lineUploadForm');
    const modalLineNumInput = document.getElementById('modalLineNum');
    const modalTitle = document.getElementById('modalTitle');

    function openUploadModal(lineNum) {
        modalLineNumInput.value = lineNum;
        modalTitle.textContent = `Upload Data for Line ${lineNum}`;
        modal.style.display = 'block';
    }

    closeBtn.onclick = () => modal.style.display = 'none';
    cancelBtn.onclick = () => modal.style.display = 'none';
    window.onclick = (event) => {
        if (event.target == modal) modal.style.display = 'none';
    }

    uploadForm.onsubmit = (e) => {
        e.preventDefault();
        const lineNum = modalLineNumInput.value;
        const excel = document.getElementById('excelFile').files[0];
        const pdf = document.getElementById('pdfFile').files[0];

        if (!excel && !pdf) {
            alert('Please select at least one file to upload.');
            return;
        }

        console.log(`Uploading for Line ${lineNum}:`, { excel, pdf });
        alert(`Files for Line ${lineNum} uploaded successfully (simulated).`);
        modal.style.display = 'none';
        uploadForm.reset();
    };

    async function loadFactoryDetail() {
        const detailContainer = document.getElementById('factoryDetail');
        
        const urlParams = new URLSearchParams(window.location.search);
        const factoryId = parseInt(urlParams.get('id')) || 1;

        const factoryLinesMapping = {
            1: [1, 2],
            2: [3, 4],
            3: [5, 6],
            4: [7, 8],
            5: [9, 10, 11]
        };

        try {
            const response = await fetch('/api/lines');
            if (!response.ok) throw new Error('API failed');
            const allLinesData = await response.json();
            
            const lineNumbers = factoryLinesMapping[factoryId] || [];
            
            let html = `<h2 class="factory-title">Factory ${factoryId}</h2>`;

            if (lineNumbers.length === 0) {
                detailContainer.innerHTML = "<h2>Factory not found</h2>";
                return;
            }

            lineNumbers.forEach((lineNum, index) => {
                const lineData = allLinesData.find(l => l.lineNumber === lineNum) || {
                    lineNumber: lineNum,
                    current: { style: 'Loading...', time: '00:00', delay: 'None' },
                    upcoming: { style: 'Loading...', time: '00:00', nextStep: 'N/A' }
                };

                html += `
                    <div class="line-section ${index > 0 ? 'line-border' : ''}">
                        <div class="line-header-row">
                            <h3 class="line-title" style="margin-bottom: 0;">Line ${lineData.lineNumber}</h3>
                            <button class="btn-upload-small" onclick="openUploadModal(${lineData.lineNumber})">
                                <span>📤</span> Upload Files
                            </button>
                        </div>

                        <div class="line-details-systematic">
                            <div class="detail-row">
                                <span class="label">
                                    <span class="file-icon-container" onclick="openOBFile('${lineData.current.style}', 'current', ${lineData.lineNumber})">
                                        <span class="file-icon">📄</span>
                                        <span class="file-tooltip">OPEN FILE</span>
                                    </span>
                                    Running style
                                </span>
                                <span class="colon">:</span>
                                <span class="value">${lineData.current.style}</span>
                            </div>
                            
                            <div class="detail-row">
                                <span class="label">
                                    <span class="file-icon-container" onclick="openOBFile('${lineData.upcoming.style}', 'upcoming', ${lineData.lineNumber})">
                                        <span class="file-icon">📄</span>
                                        <span class="file-tooltip">OPEN FILE</span>
                                    </span>
                                    Upcoming style
                                </span>
                                <span class="colon">:</span>
                                <span class="value">${lineData.upcoming.style}</span>
                            </div>

                            <div class="detail-row">
                                <span class="label">Upcoming Style Requirements</span>
                                <span class="colon">:</span>
                                <span class="value">${lineData.upcoming.nextStep || 'Standard setup'}</span>
                            </div>

                            <div class="detail-row">
                                <span class="label">Estimated Changeover time</span>
                                <span class="colon">:</span>
                                <span class="value">${lineData.upcoming.time || '45 min'}</span>
                            </div>

                            <div class="detail-row">
                                <span class="label">Running style SAM</span>
                                <span class="colon">:</span>
                                <span class="value">${lineData.current.smv != null ? lineData.current.smv.toFixed(2) : '0.00'}</span>
                            </div>

                            <div class="detail-row">
                                <span class="label">Upcoming style SAM</span>
                                <span class="colon">:</span>
                                <span class="value">${lineData.upcoming.smv != null ? lineData.upcoming.smv.toFixed(2) : '0.00'}</span>
                            </div>

                            <div class="detail-row">
                                <span class="label">Delay Reasons</span>
                                <span class="colon">:</span>
                                <span class="value">${lineData.current.delay || 'None'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            detailContainer.innerHTML = html;

        } catch (err) {
            console.error('Failed to load factory detail:', err);
            detailContainer.innerHTML = "<h2>Error loading data. Please try again.</h2>";
        }
    }

    loadFactoryDetail();
</script>
</body>
</html>
