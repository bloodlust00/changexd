<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangeX - Factory Details</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <header class="header">
        <div class="logo-section">
            <p class="welcome-text">Welcome to !</p>
            <h1 class="logo">Change<span>X</span></h1>
        </div>
        <div class="header-right">
            <span class="user-email" id="userEmployeeID">ID: 12345</span>
            <button class="btn btn-logout" onclick="logout()">
                <span>→</span> Logout
            </button>
        </div>
    </header>

    <div class="app-container">
        <nav class="sidebar">
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-item">Home</a></li>
                <li><a href="running-line.html" class="nav-item active">Running Line Changeover</a></li>
                <li><a href="upcoming.html" class="nav-item">Upcoming Changeover</a></li>
                <li><a href="live-tracking.html" class="nav-item">Live CO Tracking</a></li>
                <li><a href="alerts.html" class="nav-item">Alerts</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="whats-new.html" class="nav-item">What's New?</a>
            </div>
        </nav>

        <main class="main-content">
            <a href="running-line.html" class="back-link">← Back to Factories</a>
            
            <div class="factory-detail-card content-card" id="factoryDetail">
                <!-- Content will be loaded by JavaScript -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Factory data
        const factoryData = {
            1: {
                name: "Factory 1",
                lines: [
                    {
                        name: "Line 1",
                        runningStyle: "Style A-204",
                        runningSMV: "12.5",
                        upcomingStyle: "Style B-108",
                        upcomingSMV: "14.2",
                        requirements: "New needle plate, folder attachment",
                        estimatedTime: "45 min",
                        delayReasons: "Waiting for mechanic"
                    },
                    {
                        name: "Line 2",
                        runningStyle: "Style C-301",
                        runningSMV: "9.8",
                        upcomingStyle: "Style D-112",
                        upcomingSMV: "11.0",
                        requirements: "Bobbin change, thread color swap",
                        estimatedTime: "30 min",
                        delayReasons: "None"
                    }
                ]
            },
            2: {
                name: "Factory 2",
                lines: [
                    {
                        name: "Line 1",
                        runningStyle: "Style E-505",
                        runningSMV: "15.2",
                        upcomingStyle: "Style F-220",
                        upcomingSMV: "13.8",
                        requirements: "Presser foot change",
                        estimatedTime: "35 min",
                        delayReasons: "None"
                    },
                    {
                        name: "Line 2",
                        runningStyle: "Style G-118",
                        runningSMV: "10.5",
                        upcomingStyle: "Style H-330",
                        upcomingSMV: "12.0",
                        requirements: "Thread tension adjustment",
                        estimatedTime: "25 min",
                        delayReasons: "Material shortage"
                    }
                ]
            },
            3: {
                name: "Factory 3",
                lines: [
                    {
                        name: "Line 1",
                        runningStyle: "Style I-401",
                        runningSMV: "11.3",
                        upcomingStyle: "Style J-550",
                        upcomingSMV: "14.5",
                        requirements: "Complete machine setup",
                        estimatedTime: "55 min",
                        delayReasons: "Waiting for approval"
                    },
                    {
                        name: "Line 2",
                        runningStyle: "Style K-222",
                        runningSMV: "8.9",
                        upcomingStyle: "Style L-180",
                        upcomingSMV: "9.5",
                        requirements: "Minor adjustments",
                        estimatedTime: "20 min",
                        delayReasons: "None"
                    }
                ]
            },
            4: {
                name: "Factory 4",
                lines: [
                    {
                        name: "Line 1",
                        runningStyle: "Style M-600",
                        runningSMV: "13.7",
                        upcomingStyle: "Style N-450",
                        upcomingSMV: "12.2",
                        requirements: "Needle change, guide adjustment",
                        estimatedTime: "40 min",
                        delayReasons: "None"
                    }
                ]
            },
            5: {
                name: "Factory 5",
                lines: [
                    {
                        name: "Line 1",
                        runningStyle: "Style O-310",
                        runningSMV: "10.1",
                        upcomingStyle: "Style P-280",
                        upcomingSMV: "11.5",
                        requirements: "Feed dog adjustment",
                        estimatedTime: "30 min",
                        delayReasons: "None"
                    },
                    {
                        name: "Line 2",
                        runningStyle: "Style Q-125",
                        runningSMV: "9.2",
                        upcomingStyle: "Style R-440",
                        upcomingSMV: "13.0",
                        requirements: "Full setup change",
                        estimatedTime: "50 min",
                        delayReasons: "Parts on order"
                    }
                ]
            }
        };

        // Get factory ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const factoryId = urlParams.get('id') || 1;
        const factory = factoryData[factoryId];

        // Render factory details
        const detailContainer = document.getElementById('factoryDetail');
        if (factory) {
            let html = `<h2 class="factory-title">${factory.name}</h2>`;
            factory.lines.forEach((line, index) => {
                html += `
                    <div class="line-section ${index > 0 ? 'line-border' : ''}">
                        <h3 class="line-title">${line.name}</h3>
                        <div class="line-details">
                            <div class="detail-column">
                                <p><strong>Running style</strong> : ${line.runningStyle}</p>
                                <p><strong>Upcoming style</strong> : ${line.upcomingStyle}</p>
                                <p><strong>Upcoming Style Requirements</strong> : ${line.requirements}</p>
                                <p><strong>Estimated Changeover time</strong> : ${line.estimatedTime}</p>
                            </div>
                            <div class="detail-column">
                                <p><strong>Running style SMV</strong> : ${line.runningSMV}</p>
                                <p><strong>Upcoming style SMV</strong> : ${line.upcomingSMV}</p>
                                <p><strong>Delay Reasons</strong> : ${line.delayReasons}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            detailContainer.innerHTML = html;
        }
    </script>
</body>
</html>
